<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>WebRTC Конференция</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  #controls { margin-bottom: 20px; }
  input { margin-right: 10px; }
  button { margin-right: 10px; padding: 8px 16px; }
  #videos { display: flex; flex-wrap: wrap; gap: 10px; }
  video { width: 30%; background: #000; }
</style>
</head>
<body>

<h1>WebRTC Видеоконференция</h1>

<div id="controls">
  <button id="createBtn">Создать сессию</button>
  <input type="text" id="sessionIdInput" placeholder="Введите ID сессии" />
  <button id="joinBtn">Присоединиться</button>
</div>

<div id="status"></div>

<h2>Мои видео</h2>
<video id="localVideo" autoplay playsinline muted></video>

<h2>Видео участников</h2>
<div id="remoteVideos"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-database-compat.js"></script>

<!-- Подключение внешнего файла main.js -->
<script src="main.js"></script>

</body>
</html>
